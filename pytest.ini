[pytest]
# Pytest configuration file for ThingList tests

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = test

# Output options
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Markers
markers =
    integration: Integration tests
    slow: Slow running tests
    auth: Authentication tests
    list: List management tests
    item: Item management tests
    group: Group management tests
    security: Security related tests
    performance: Performance tests
    parametrize: Parametrized tests

# Coverage options (when running with --cov)
[coverage:run]
branch = True
source = .

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    pass
